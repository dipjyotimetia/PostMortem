name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint and format check (Biome)
        run: bun run lint

      - name: Type-check
        run: bun run typecheck

      - name: Run tests with coverage
        run: bun run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages (CLI + extension)
        run: bun run build:all

      - name: Smoke test conversion with example collection
        run: bun run convert

      - name: Verify Bun-native output and extension build
        run: |
          test -f test-output/setup.ts
          test -f vscode-extension/dist/extension.js
          if grep -rIl -E "mocha|supertest|chai|axios" test-output/; then
            echo "::error::Generated output still references legacy test tooling"
            exit 1
          fi
          echo "✅ All builds successful and output is Bun-native"
