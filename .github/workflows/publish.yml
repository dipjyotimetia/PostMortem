name: Manual Publish CLI and VSCode Extension

on:
  push:
    tags:
      - 'cli-v*'
      - 'ext-v*'

jobs:
  # Determine what should be published based on trigger
  check-trigger:
    runs-on: ubuntu-latest
    outputs:
      publish_cli: ${{ steps.check.outputs.publish_cli }}
      publish_extension: ${{ steps.check.outputs.publish_extension }}
    steps:
      - id: check
        run: |
          if [[ "${{ github.ref }}" == refs/tags/cli-v* ]]; then
            echo "publish_cli=true" >> $GITHUB_OUTPUT
            echo "publish_extension=false" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/ext-v* ]]; then
            echo "publish_cli=false" >> $GITHUB_OUTPUT
            echo "publish_extension=true" >> $GITHUB_OUTPUT
          fi

  publish-cli:
    needs: check-trigger
    if: needs.check-trigger.outputs.publish_cli == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Node + npm are used for the publish step (npm provenance + registry auth)
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI
        run: bun run build

      - name: Run tests
        run: bun run test

      - name: Lint
        run: bun run lint

      - name: Publish CLI to NPM
        run: npm publish --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-extension:
    needs: [check-trigger, publish-cli]
    if: always() && needs.check-trigger.outputs.publish_extension == 'true' && (needs.publish-cli.result == 'success' || needs.publish-cli.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build:all

      - name: Lint extension
        working-directory: ./vscode-extension
        run: bun run lint

      - name: Verify extension build integrity
        working-directory: ./vscode-extension
        run: |
          test -f dist/extension.js
          echo "✅ Extension build verified"

      - name: Package VSCode extension
        working-directory: ./vscode-extension
        run: npx --yes @vscode/vsce package

      - name: Publish VSCode extension
        working-directory: ./vscode-extension
        run: npx --yes @vscode/vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Upload VSIX as artifact
        uses: actions/upload-artifact@v7
        with:
          name: vscode-extension
          path: ./vscode-extension/*.vsix
